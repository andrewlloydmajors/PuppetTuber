<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Puppet</title>
<style>
  html, body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #2b2b2b;
    font-family: system-ui, sans-serif;
    color: #eee;
  }

  #stage {
    position: relative;
    width: min(90vw, 600px);
    aspect-ratio: 1 / 1;
  }

  #stage img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    user-select: none;
  }

  #eyes {
    transition: transform 0.2s ease-in-out;
  }

  #eyesBlink {
    opacity: 0;
  }

  #instructions {
    margin-top: 20px;
    text-align: center;
    font-size: 14px;
    opacity: 0.8;
    max-width: 90vw;
  }

  #controls {
    margin-top: 16px;
    text-align: center;
    font-size: 14px;
  }

  #micSettings {
    margin-top: 10px;
    display: none;
  }

  #micSettings label {
    display: block;
    margin-bottom: 6px;
  }

  #meter {
    width: 240px;
    height: 12px;
    background: #444;
    border-radius: 6px;
    overflow: hidden;
    margin: 0 auto;
  }

  #meterFill {
    height: 100%;
    width: 0%;
    background: #888;
    transition: width 0.05s linear, background-color 0.1s linear;
  }
</style>
</head>
<body>

  <div id="stage">
    <img id="eyeWhites" src="apeyewhites.png" alt="">
    <img id="body" src="apbody.png" alt="">
    <img id="eyes" src="apeyes.png" alt="">
    <img id="head" src="apheadfront.png" alt="">
    <img id="eyesBlink" src="apeyesblink.png" alt="">
    <img id="mouth" src="apmouth1.png" alt="">
  </div>

  <div id="instructions">
    Hold <strong>A</strong> / <strong>Left Arrow</strong> &mdash; look left<br>
    Hold <strong>D</strong> / <strong>Right Arrow</strong> &mdash; look right<br>
    Hold <strong>Space</strong> &mdash; talk<br>
    Mic mode (below) animates the mouth whenever your mic volume is above the threshold &mdash; Space still works too.
  </div>

  <div id="controls">
    <label>
      <input type="checkbox" id="micToggle">
      Mic mode (mouth only animates while you're making sound)
    </label>
    <div id="micSettings">
      <label for="threshold">Sensitivity threshold</label>
      <input type="range" id="threshold" min="1" max="100" value="15">
      <div id="meter"><div id="meterFill"></div></div>
    </div>
  </div>

<script>
  const headEl = document.getElementById('head');
  const eyeWhitesEl = document.getElementById('eyeWhites');
  const eyesEl = document.getElementById('eyes');
  const eyesBlinkEl = document.getElementById('eyesBlink');
  const mouthEl = document.getElementById('mouth');

  const HEAD_FRONT = 'apheadfront.png';
  const HEAD_LEFT = 'apheadleft.png';
  const HEAD_RIGHT = 'apheadright.png';

  // Eye whites layer: static (no glance movement), sits at the very bottom
  // of the stack so the body art covers any part of it outside the body
  // outline. Swaps per head direction along with everything else.
  const EYE_WHITES = {
    front: 'apeyewhites.png',
    left: 'apeyewhitesleft.png',
    right: 'apeyewhitesright.png'
  };

  // Open-eyes layer (sits behind the head) and blink layer (sits on top of
  // the head, since the blink art redraws the eyelids over the face), each
  // with their own version per head direction.
  const EYES_STRAIGHT = {
    front: 'apeyes.png',
    left: 'apeyesleft.png',
    right: 'apeyesright.png'
  };
  const EYES_BLINK = {
    front: 'apeyesblink.png',
    left: 'apeyesblinkleft.png',
    right: 'apeyesblinkright.png'
  };

  const MOUTH_CLOSED = 'apmouth1.png';
  const MOUTH_TALK_FRAMES = [
    'apmouth1.png',
    'apmouth2.png',
    'apmouth3.png',
    'apmouth4.png',
    'apmouth5.png'
  ];

  let currentDirection = 'front'; // 'front' | 'left' | 'right'

  // ---- Talking state ----
  // The mouth animates whenever spaceHeld is true, OR mic mode is enabled
  // and the current mic volume is above the threshold. Either source (or
  // both at once) can drive the animation.
  let spaceHeld = false;
  let micEnabled = false;
  let currentVolume = 0; // roughly 0-100
  let threshold = 15;

  function shouldAnimateMouth() {
    return spaceHeld || (micEnabled && currentVolume > threshold);
  }

  function setHead(direction) {
    currentDirection = direction;
    eyeWhitesEl.src = EYE_WHITES[direction];
    eyesEl.src = EYES_STRAIGHT[direction];
    updateEyeTransform();

    if (direction === 'left') {
      headEl.src = HEAD_LEFT;
      mouthEl.style.display = 'none';
    } else if (direction === 'right') {
      headEl.src = HEAD_RIGHT;
      mouthEl.style.display = 'none';
    } else {
      headEl.src = HEAD_FRONT;
      mouthEl.style.display = 'block';
      updateMouth();
    }
  }

  function updateMouth() {
    if (currentDirection !== 'front') return;

    if (shouldAnimateMouth()) {
      const frame = MOUTH_TALK_FRAMES[Math.floor(Math.random() * MOUTH_TALK_FRAMES.length)];
      mouthEl.src = frame;
    } else {
      mouthEl.src = MOUTH_CLOSED;
    }
  }

  // Continuously cycle the mouth shape while talking should be animated.
  // When shouldAnimateMouth() is false this just keeps re-setting the
  // closed mouth, which is harmless.
  setInterval(updateMouth, 120);

  // ---- Eye animation ----
  // Since you now have separate eye art per head direction, these should
  // normally stay at 0. They're here as a fallback fine-tune knob (in % of
  // the eye image's own size) in case any direction still looks slightly off.
  const EYE_BASE_OFFSET = {
    front: { x: 0, y: 0 },
    left:  { x: 0, y: 0 },
    right: { x: 0, y: 0 }
  };

  // How far the pupils shift when glancing, in % of the pupil image's own
  // size. This is the main knob to tweak — lower = more subtle.
  const EYE_GLANCE_DISTANCE = 1.2;

  // Directions the eyes can glance toward (unit vectors, scaled by
  // EYE_GLANCE_DISTANCE above). No need to touch these unless you want to
  // add/remove possible glance directions.
  const EYE_GLANCE_DIRECTIONS = [
    { x: 1, y: 0 },
    { x: -1, y: 0 },
    { x: 0, y: -1 },
    { x: 0, y: 1 },
    { x: 0.7, y: -0.7 },
    { x: -0.7, y: -0.7 },
    { x: 0.7, y: 0.7 },
    { x: -0.7, y: 0.7 }
  ];

  let glanceOffset = { x: 0, y: 0 };

  function updateEyeTransform() {
    const base = EYE_BASE_OFFSET[currentDirection] || EYE_BASE_OFFSET.front;
    const x = base.x + glanceOffset.x;
    const y = base.y + glanceOffset.y;
    eyesEl.style.transform = `translate(${x}%, ${y}%)`;
  }

  function scheduleNextGlance() {
    const delayBeforeGlance = 2000 + Math.random() * 4000; // 2-6s of looking straight
    setTimeout(() => {
      const dir = EYE_GLANCE_DIRECTIONS[Math.floor(Math.random() * EYE_GLANCE_DIRECTIONS.length)];
      glanceOffset = { x: dir.x * EYE_GLANCE_DISTANCE, y: dir.y * EYE_GLANCE_DISTANCE };
      updateEyeTransform();

      const glanceDuration = 1000 + Math.random() * 1000; // hold for 1-2s
      setTimeout(() => {
        glanceOffset = { x: 0, y: 0 };
        updateEyeTransform();
        scheduleNextGlance();
      }, glanceDuration);
    }, delayBeforeGlance);
  }

  function scheduleNextBlink() {
    const delayBeforeBlink = 2000 + Math.random() * 5000; // 2-7s between blinks
    setTimeout(() => {
      // Pick the blink art for whatever direction we're facing right now,
      // and keep using it for the full blink even if the head turns
      // mid-blink - swapping it while visible looks glitchy.
      eyesBlinkEl.src = EYES_BLINK[currentDirection];
      eyesBlinkEl.style.opacity = '1';

      setTimeout(() => {
        eyesBlinkEl.style.opacity = '0';
        scheduleNextBlink();
      }, 150); // blink duration

    }, delayBeforeBlink);
  }

  // Set initial images for the front-facing head
  eyeWhitesEl.src = EYE_WHITES.front;
  eyesEl.src = EYES_STRAIGHT.front;
  eyesBlinkEl.src = EYES_BLINK.front;

  updateEyeTransform();
  scheduleNextGlance();
  scheduleNextBlink();

  const pressedKeys = new Set();
  const LEFT_KEYS = ['KeyA', 'ArrowLeft'];
  const RIGHT_KEYS = ['KeyD', 'ArrowRight'];

  window.addEventListener('keydown', (e) => {
    if (pressedKeys.has(e.code)) return; // ignore OS key-repeat
    pressedKeys.add(e.code);

    if (LEFT_KEYS.includes(e.code)) {
      e.preventDefault();
      setHead('left');
    } else if (RIGHT_KEYS.includes(e.code)) {
      e.preventDefault();
      setHead('right');
    } else if (e.code === 'Space') {
      e.preventDefault();
      spaceHeld = true;
      updateMouth();
    }
  });

  window.addEventListener('keyup', (e) => {
    pressedKeys.delete(e.code);

    if (LEFT_KEYS.includes(e.code) || RIGHT_KEYS.includes(e.code)) {
      // if the other direction is still held, switch to it; otherwise go front
      if (RIGHT_KEYS.some(k => pressedKeys.has(k))) {
        setHead('right');
      } else if (LEFT_KEYS.some(k => pressedKeys.has(k))) {
        setHead('left');
      } else {
        setHead('front');
      }
    } else if (e.code === 'Space') {
      spaceHeld = false;
      updateMouth();
    }
  });

  // safety reset if the window loses focus mid-keypress
  window.addEventListener('blur', () => {
    pressedKeys.clear();
    spaceHeld = false;
    setHead('front');
  });

  // ---- Mic mode ----

  let audioContext = null;
  let analyser = null;
  let micStream = null;
  let dataArray = null;

  const micToggle = document.getElementById('micToggle');
  const micSettings = document.getElementById('micSettings');
  const thresholdSlider = document.getElementById('threshold');
  const meterFill = document.getElementById('meterFill');

  threshold = Number(thresholdSlider.value);

  thresholdSlider.addEventListener('input', () => {
    threshold = Number(thresholdSlider.value);
  });

  micToggle.addEventListener('change', async () => {
    if (micToggle.checked) {
      const ok = await enableMic();
      if (!ok) {
        micToggle.checked = false;
        return;
      }
      micSettings.style.display = 'block';
    } else {
      disableMic();
      micSettings.style.display = 'none';
    }
  });

  async function enableMic() {
    try {
      micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch (err) {
      alert('Could not access the microphone. Check your browser permissions and try again.');
      return false;
    }

    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const source = audioContext.createMediaStreamSource(micStream);
    analyser = audioContext.createAnalyser();
    analyser.fftSize = 512;
    source.connect(analyser);
    dataArray = new Uint8Array(analyser.fftSize);

    micEnabled = true;
    requestAnimationFrame(meterLoop);
    return true;
  }

  function disableMic() {
    micEnabled = false;
    currentVolume = 0;
    meterFill.style.width = '0%';
    updateMouth();

    if (micStream) {
      micStream.getTracks().forEach(track => track.stop());
      micStream = null;
    }
    if (audioContext) {
      audioContext.close();
      audioContext = null;
    }
    analyser = null;
    dataArray = null;
  }

  function meterLoop() {
    if (!micEnabled) return;

    analyser.getByteTimeDomainData(dataArray);

    // root-mean-square of the waveform, scaled to roughly 0-100
    let sumSquares = 0;
    for (let i = 0; i < dataArray.length; i++) {
      const sample = (dataArray[i] - 128) / 128;
      sumSquares += sample * sample;
    }
    const rms = Math.sqrt(sumSquares / dataArray.length);
    currentVolume = Math.min(100, rms * 300);

    meterFill.style.width = currentVolume + '%';
    meterFill.style.backgroundColor = currentVolume > threshold ? '#4caf50' : '#888';

    requestAnimationFrame(meterLoop);
  }
</script>

</body>
</html>
