<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Puppet</title>
<script type="module">
// MediaPipe FaceLandmarker — loaded as an ES module from CDN.
// We attach the pieces we need to window so the main (non-module) script
// can reach them after the import resolves.
import {
  FaceLandmarker,
  FilesetResolver
} from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs';

window._FaceLandmarker   = FaceLandmarker;
window._FilesetResolver  = FilesetResolver;
window._mpReady = true;
window.dispatchEvent(new Event('mpReady'));
</script>
<style>
  html, body {
    margin: 0;
    min-height: 100vh;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #111;
    font-family: system-ui, sans-serif;
    color: #eee;
  }

  /* Full-page background layer, sits behind everything */
  #bg {
    position: fixed;
    inset: 0;
    z-index: -1;
    background-color: #2b2b2b;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }

  /* Background layer sits inside the stage, behind all puppet layers.
     This means the background only shows through the transparent parts of
     the puppet PNGs — i.e. the actual black areas of the canvas. */
  #stageBg {
    position: absolute;
    inset: 0;
    z-index: 0;
    background-color: #2b2b2b;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }

  #stage {
    position: relative;
    width: min(90vw, 600px);
    aspect-ratio: 1 / 1;
    overflow: hidden;
  }

  #stage img, #puppet-wrap, #body-wrap, #tilt-wrap, #head-wrap {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    user-select: none;
  }

  #puppet-wrap {
    transform-origin: bottom center;
    transition: transform 0.15s ease-out;
  }

  #body-wrap, #tilt-wrap, #head-wrap {
    pointer-events: none;
    transition: transform 0.1s ease-out;
  }

  /* Every variant of every animated layer is its own <img>, stacked in
     place. Only the "shown" one is visible. Nothing ever has its src
     swapped, which avoids the flicker/glitch that comes from the browser
     re-decoding an image mid-animation. */
  .layer {
    opacity: 0;
  }

  .layer.shown {
    opacity: 1;
  }

  .pupils {
    transition: transform 0.2s ease-in-out;
  }

  @keyframes bodyBob {
    0%   { transform: translateY(0px); }
    40%  { transform: translateY(-8px); }
    60%  { transform: translateY(-8px); }
    100% { transform: translateY(0px); }
  }

  @keyframes headBob {
    0%   { transform: translateY(0px); }
    40%  { transform: translateY(-6px); }
    60%  { transform: translateY(-6px); }
    100% { transform: translateY(0px); }
  }

  #stage.bobbing #body-wrap {
    animation: bodyBob 3.8s ease-in-out infinite;
  }

  /* tilt-wrap handles rotation; head-wrap inside it handles the bob */
  #stage.bobbing #head-wrap {
    animation: headBob 3.8s ease-in-out 0.3s infinite;
  }

  /* ---- Collapsible settings menu ---- */
  #menuWrap {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 100;
    font-family: system-ui, sans-serif;
    font-size: 13px;
    color: #eee;
  }

  #menuToggle {
    display: block;
    margin-left: auto;
    background: rgba(0,0,0,0.55);
    border: 1px solid rgba(255,255,255,0.15);
    color: #eee;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    backdrop-filter: blur(4px);
  }

  #menuToggle:hover { background: rgba(0,0,0,0.75); }

  #settingsPanel {
    display: none;
    margin-top: 8px;
    background: rgba(0,0,0,0.72);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 14px 18px;
    width: 240px;
    max-height: calc(100vh - 80px);
    overflow-y: auto;
    backdrop-filter: blur(6px);
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    box-sizing: border-box;
  }

  #settingsPanel.open { display: block; }

  .menuSection {
    margin-bottom: 14px;
  }

  .menuSection:last-child { margin-bottom: 0; }

  .menuSectionTitle {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    opacity: 0.5;
    margin-bottom: 7px;
  }

  .menuRow {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 5px;
    line-height: 1.4;
    flex-wrap: wrap;
  }

  .menuRow:last-child { margin-bottom: 0; }

  kbd {
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 3px;
    padding: 1px 5px;
    font-size: 11px;
    font-family: monospace;
  }

  #micSettings {
    display: none;
    margin-top: 6px;
  }

  #meter {
    width: 100%;
    height: 8px;
    background: #333;
    border-radius: 4px;
    overflow: hidden;
    margin-top: 4px;
  }

  #meterFill {
    height: 100%;
    width: 0%;
    background: #888;
    transition: width 0.05s linear, background-color 0.1s linear;
  }

  #bgImageName {
    font-size: 11px;
    opacity: 0.6;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 180px;
  }

  #settingsPanel button {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #eee;
    border-radius: 4px;
    padding: 3px 10px;
    cursor: pointer;
    font-size: 12px;
  }

  #settingsPanel button:hover { background: rgba(255,255,255,0.2); }

  input[type="range"] { width: 100%; margin-top: 2px; }

  /* ---- Webcam preview ---- */
  #camPreview {
    margin-top: 6px;
  }

  #camStatus {
    font-size: 11px;
    margin-top: 4px;
    opacity: 0.6;
  }

  .camSliderRow {
    display: flex;
    flex-direction: column;
    gap: 2px;
    margin-top: 6px;
  }

  .camSliderRow label {
    font-size: 11px;
    opacity: 0.7;
    display: flex;
    justify-content: space-between;
  }
</style>
</head>
<body>

  <div id="stage">
    <!-- Background: outside puppet-wrap so it never rotates with the lean -->
    <div id="stageBg"></div>

    <!-- Puppet wrap: lean pivots this, not the stage or background -->
    <div id="puppet-wrap">
      <!-- Body wrap: bobs with full amplitude -->
      <div id="body-wrap">
        <img id="body" src="apbody.png" alt="">
      </div>

      <!-- Tilt wrap: rotated by webcam roll, separate from bob animation -->
      <div id="tilt-wrap">
        <!-- Head wrap: bobs with less amplitude and a slight delay -->
        <div id="head-wrap">
        <!-- Eye whites: behind the body outline, tilts with the head -->
        <img class="layer eyewhites shown" data-dir="front" src="apeyewhites.png" alt="">
        <img class="layer eyewhites"       data-dir="left"  src="apeyewhitesleft.png" alt="">
        <img class="layer eyewhites"       data-dir="right" src="apeyewhitesright.png" alt="">
        <img class="layer pupils shown" data-dir="front" src="apeyes.png" alt="">
        <img class="layer pupils"       data-dir="left"  src="apeyesleft.png" alt="">
        <img class="layer pupils"       data-dir="right" src="apeyesright.png" alt="">

        <!-- Head -->
        <img class="layer head shown" data-dir="front" src="apheadfront.png" alt="">
        <img class="layer head"       data-dir="left"  src="apheadleft.png" alt="">
        <img class="layer head"       data-dir="right" src="apheadright.png" alt="">
        <img class="layer head"       data-dir="frontsmile" src="apheadfrontsmile.png" alt="">

        <!-- Blink overlay: on top of the head -->
        <img class="layer blink" data-dir="front" src="apeyesblink.png" alt="">
        <img class="layer blink" data-dir="left"  src="apeyesblinkleft.png" alt="">
        <img class="layer blink" data-dir="right" src="apeyesblinkright.png" alt="">

        <!-- Mouth frames (only shown when facing front) -->
        <img class="layer mouth shown" data-frame="1" src="apmouth1.png" alt="">
        <img class="layer mouth"       data-frame="2" src="apmouth2.png" alt="">
        <img class="layer mouth"       data-frame="3" src="apmouth3.png" alt="">
        <img class="layer mouth"       data-frame="4" src="apmouth4.png" alt="">
        <img class="layer mouth"       data-frame="5" src="apmouth5.png" alt="">
        </div><!-- end head-wrap -->
      </div><!-- end tilt-wrap -->
    </div><!-- end puppet-wrap -->
  </div>

  <div id="menuWrap">
    <button id="menuToggle" title="Show / hide settings">☰ Settings</button>

    <div id="settingsPanel">
      <div class="menuSection">
        <div class="menuSectionTitle">Controls</div>
        <div class="menuRow"><kbd>A</kbd> / <kbd>D</kbd> — look left / right</div>
        <div class="menuRow"><kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> — move eyes (diagonals work too)</div>
        <div class="menuRow"><kbd>1</kbd> — smile (front view only)</div>
        <div class="menuRow"><kbd>Space</kbd> — talk</div>
      </div>

      <div class="menuSection">
        <div class="menuSectionTitle">Mic</div>
        <label class="menuRow">
          <input type="checkbox" id="micToggle">
          Mic mode
        </label>
        <div id="micSettings">
          <label class="menuRow" for="threshold">Sensitivity</label>
          <input type="range" id="threshold" min="1" max="100" value="15">
          <div id="meter"><div id="meterFill"></div></div>
        </div>
      </div>

      <div class="menuSection">
        <div class="menuSectionTitle">Idle animations</div>
        <label class="menuRow">
          <input type="checkbox" id="toggleBreathing">
          Breathing
        </label>
        <label class="menuRow">
          <input type="checkbox" id="toggleHeadMovement">
          Head movement
        </label>
        <label class="menuRow">
          <input type="checkbox" id="toggleEyeMovement">
          Eye movement
        </label>
        <label class="menuRow">
          <input type="checkbox" id="toggleSmileAfterTalk">
          Smile after talking
        </label>
      </div>

      <div class="menuSection">
        <div class="menuSectionTitle">Webcam tracking</div>
        <label class="menuRow">
          <input type="checkbox" id="toggleCam">
          Enable webcam tracking
        </label>
        <div id="camStatus"></div>
        <div id="camSettings" style="display:none">
          <label class="menuRow" style="margin-top:4px">
            <input type="checkbox" id="toggleCamMouth" checked>
            Mouth tracking
          </label>
          <label class="menuRow">
            <input type="checkbox" id="toggleCamSmile" checked>
            Smile tracking
          </label>
          <label class="menuRow">
            <input type="checkbox" id="toggleCamTilt" checked>
            Head tilt
          </label>
          <label class="menuRow">
            <input type="checkbox" id="toggleCamLean" checked>
            Body lean (follows face position)
          </label>
          <label class="menuRow">
            <input type="checkbox" id="toggleCamEyes" checked>
            Eye tracking
          </label>
          <div class="camSliderRow">
            <label>
              <span>Head turn threshold</span>
              <span id="camYawVal">12°</span>
            </label>
            <input type="range" id="camYawThresh" min="3" max="30" value="12">
          </div>
          <div id="camMouthSliderWrap" class="camSliderRow">
            <label>
              <span>Mouth open threshold</span>
              <span id="camMouthVal">0.04</span>
            </label>
            <input type="range" id="camMouthThresh" min="1" max="20" value="4">
          </div>
          <div class="camSliderRow">
            <label>
              <span>O-face threshold</span>
              <span id="camOFaceVal">0.40</span>
            </label>
            <input type="range" id="camOFaceThresh" min="10" max="80" value="40">
          </div>
          <div class="menuRow" style="margin-top:8px; flex-direction:column; align-items:flex-start; gap:4px;">
            <button id="camCalibrateBtn">Calibrate eye center</button>
            <span id="camCalibrateStatus" style="font-size:11px; opacity:0.6;"></span>
          </div>
          <div id="camPreview">
            <label class="menuRow" style="font-size:11px">
              <input type="checkbox" id="toggleCamPreview" checked>
              Show preview
            </label>
          </div>
        </div>
      </div>

      <div class="menuSection">
        <div class="menuSectionTitle">Background</div>
        <label class="menuRow">
          Color
          <input type="color" id="bgColorPicker" value="#2b2b2b">
        </label>
        <div class="menuRow">
          <input type="file" id="bgImagePicker" accept="image/*" style="display:none">
          <button id="bgImageBtn" onclick="document.getElementById('bgImagePicker').click()">Choose image</button>
          <button id="clearBgImage" style="display:none">✕ Remove</button>
        </div>
        <div class="menuRow"><span id="bgImageName"></span></div>
      </div>
    </div>
  </div>

  <!-- Webcam video lives outside the settings panel so hiding the panel
       doesn't pause the video stream. The floating preview below is shown
       or hidden independently via the "Show preview" checkbox. -->
  <video id="camVideo" autoplay playsinline muted
    style="position:fixed; top:-9999px; left:-9999px; width:1px; height:1px; opacity:0;"
    aria-hidden="true"></video>

  <div id="camFloatPreview" style="display:none; position:fixed; bottom:16px; right:16px;
    width:160px; aspect-ratio:4/3; border-radius:8px; overflow:hidden;
    border:1px solid rgba(255,255,255,0.2); box-shadow:0 2px 12px rgba(0,0,0,0.5); z-index:90;">
    <canvas id="camCanvas" style="width:100%; height:100%; display:block; transform:scaleX(-1);"></canvas>
  </div>

<script>
  // ---- Build layer maps ----
  // Each map looks like { front: <img>, left: <img>, right: <img> } (or, for
  // mouth, { '1': <img>, ..., '5': <img> }). setActive() shows exactly one
  // element from a map (or none) by toggling the 'shown' class - no src
  // swapping anywhere.
  function buildLayerMap(className, datasetKey) {
    const map = {};
    document.querySelectorAll('.' + className).forEach((el) => {
      map[el.dataset[datasetKey]] = el;
    });
    return map;
  }

  const eyeWhitesLayers = buildLayerMap('eyewhites', 'dir');
  const pupilLayers = buildLayerMap('pupils', 'dir');
  const headLayers = buildLayerMap('head', 'dir');
  const blinkLayers = buildLayerMap('blink', 'dir');
  const mouthLayers = buildLayerMap('mouth', 'frame');

  function setActive(map, key) {
    const keyStr = key === null ? null : String(key);
    Object.entries(map).forEach(([k, el]) => {
      el.classList.toggle('shown', k === keyStr);
    });
  }

  let currentDirection = 'front'; // 'front' | 'left' | 'right'
  let blinkVisible = false; // true while the blink overlay is currently shown

  // ---- Head direction control ----
  // manualDirection reflects the A/D / arrow keys and always wins.
  // autopilotDirection is what autopilot currently wants to show.
  // The effective direction is manualDirection if set, else autopilot's
  // choice (if enabled), else 'front'.
  let manualDirection = null; // 'left' | 'right' | null
  let idleHeadEnabled = false;
  let idleSmileEnabled = false;
  let autopilotDirection = 'front'; // 'front' | 'left' | 'right'

  function refreshHeadDirection() {
    // Priority: manual key > webcam > idle head movement > front
    const direction = manualDirection
      || (camEnabled ? camDirection : null)
      || (idleHeadEnabled ? autopilotDirection : null)
      || 'front';
    if (direction !== currentDirection) {
      setHead(direction);
    }
  }

  // ---- Talking state ----
  // The mouth animates whenever spaceHeld is true, OR mic mode is enabled
  // and the current mic volume is above the threshold. Either source (or
  // both at once) can drive the animation.
  let spaceHeld = false;
  let micEnabled = false;
  let currentVolume = 0; // roughly 0-100
  let threshold = 15;

  // Webcam state — declared here so shouldAnimateMouth() and
  // refreshHeadDirection() can reference them before the webcam section
  // initialises later in the script.
  let camEnabled   = false;
  let camDirection = null;
  let camMouthOpen = false;
  let camBlinking  = false; // true when webcam detects eyes closed
  let camMouthWide = false; // true when webcam sees a wide open O-shape
  let camGazeXHistory = [];
  let camGazeYHistory = [];

  function shouldAnimateMouth() {
    // Webcam mouth state (camMouthOpen/camMouthWide) never drives the talking
    // animation — it only feeds the idle-open-shape display logic in
    // updateHeadLayer so it can coexist cleanly with mic and Space.
    return spaceHeld || (micEnabled && currentVolume > threshold);
  }

  // ---- Smile expression ----
  // Smile is an alternate front-facing head ('frontsmile'), independent of
  // direction. manualSmile follows the S key; autopilotSmile is triggered
  // automatically (see below). Either one showing it counts, but only while
  // facing front (there's no smile art for left/right).
  let manualSmile = false;
  let autopilotSmile = false;

  function setHead(direction) {
    currentDirection = direction;
    setActive(eyeWhitesLayers, direction);
    setActive(pupilLayers, direction);
    updateEyeTransform();

    // If a blink is currently visible, its art was drawn for whatever
    // direction we were facing when it started. If we've now turned a
    // different way, that art no longer matches - cut the blink short
    // rather than showing a mismatched eyelid shape.
    if (blinkVisible) {
      setActive(blinkLayers, null);
      blinkVisible = false;
    }

    updateHeadLayer();
  }

  // Picks which head image to show (normal per-direction art, or the
  // front-facing smile) and which mouth frame (if any) goes with it.
  function updateHeadLayer() {
    const showSmile = (manualSmile || autopilotSmile) && currentDirection === 'front';

    if (showSmile) {
      setActive(headLayers, 'frontsmile');
      setActive(mouthLayers, null); // smile has its mouth baked in
      return;
    }

    setActive(headLayers, currentDirection);

    if (currentDirection !== 'front') {
      setActive(mouthLayers, null);
      return;
    }

    if (shouldAnimateMouth()) {
      const frame = 1 + Math.floor(Math.random() * 5); // 1-5
      setActive(mouthLayers, frame);
    } else if (camEnabled && camMouthWide) {
      // Webcam sees wide-open O-shape — show O-face regardless of mic state
      setActive(mouthLayers, 5);
    } else if (camEnabled && camMouthOpen) {
      // Webcam sees mouth open but no talking trigger — idle open shape
      setActive(mouthLayers, 2);
    } else {
      setActive(mouthLayers, 1); // closed
    }
  }

  // ---- Post-talk smile (autopilot only) ----
  // How long after talking stops before the smile appears, and how long it
  // stays. Both should comfortably fit inside AUTOPILOT_IDLE_DELAY below so
  // idle wandering doesn't kick in mid-smile.
  const SMILE_DELAY_AFTER_TALK = 400;
  const SMILE_DURATION = 2000;

  function scheduleSmileAfterTalk() {
    setTimeout(() => {
      const stillQuiet = !shouldAnimateMouth();
      const stillFreeToSmile = idleSmileEnabled && manualDirection === null && currentDirection === 'front' && !manualSmile;

      if (stillQuiet && stillFreeToSmile) {
        autopilotSmile = true;
        updateHeadLayer();

        setTimeout(() => {
          autopilotSmile = false;
          updateHeadLayer();
        }, SMILE_DURATION);
      }
    }, SMILE_DELAY_AFTER_TALK);
  }

  // Continuously cycle the mouth shape while talking should be animated.
  // When shouldAnimateMouth() is false this just keeps re-setting the
  // closed mouth, which is harmless. This loop also feeds autopilot: any
  // time talking is active, autopilot is told to face front and the idle
  // timer is reset, and any post-talk smile in progress is cut short. When
  // talking stops, it kicks off the post-talk smile (autopilot only).
  let wasTalking = false;

  setInterval(() => {
    const talkingNow = shouldAnimateMouth();

    if (talkingNow) {
      lastTalkTime = Date.now();

      if (autopilotDirection !== 'front') {
        autopilotDirection = 'front';
        refreshHeadDirection();
      }

      if (autopilotSmile) {
        autopilotSmile = false;
      }
    } else if (wasTalking && idleSmileEnabled) {
      scheduleSmileAfterTalk();
    }

    wasTalking = talkingNow;
    updateHeadLayer();
  }, 120);

  // ---- Eye animation ----
  // Since you now have separate eye art per head direction, these should
  // normally stay at 0. They're here as a fallback fine-tune knob (in % of
  // the eye image's own size) in case any direction still looks slightly off.
  const EYE_BASE_OFFSET = {
    front: { x: 0, y: 0 },
    left:  { x: 0, y: 0 },
    right: { x: 0, y: 0 }
  };

  // How far the pupils shift when glancing, in % of the pupil image's own
  // size. This is the main knob to tweak — lower = more subtle.
  const EYE_GLANCE_DISTANCE = 1.2;

  // Directions the eyes can glance toward (unit vectors, scaled by
  // EYE_GLANCE_DISTANCE above). No need to touch these unless you want to
  // add/remove possible glance directions.
  const EYE_GLANCE_DIRECTIONS = [
    { x: 1, y: 0 },
    { x: -1, y: 0 },
    { x: 0, y: -1 },
    { x: 0, y: 1 },
    { x: 0.7, y: -0.7 },
    { x: -0.7, y: -0.7 },
    { x: 0.7, y: 0.7 },
    { x: -0.7, y: 0.7 }
  ];

  let glanceOffset = { x: 0, y: 0 };

  let idleEyeEnabled = false;

  function updateEyeTransform() {
    Object.entries(pupilLayers).forEach(([dir, el]) => {
      const base = EYE_BASE_OFFSET[dir] || { x: 0, y: 0 };
      const x = base.x + glanceOffset.x;
      const y = base.y + glanceOffset.y;
      el.style.transform = `translate(${x}%, ${y}%)`;
    });
  }

  function scheduleNextGlance() {
    const delayBeforeGlance = 2000 + Math.random() * 4000; // 2-6s of looking straight
    setTimeout(() => {
      if (idleEyeEnabled) {
        const dir = EYE_GLANCE_DIRECTIONS[Math.floor(Math.random() * EYE_GLANCE_DIRECTIONS.length)];
        glanceOffset = { x: dir.x * EYE_GLANCE_DISTANCE, y: dir.y * EYE_GLANCE_DISTANCE };
        updateEyeTransform();
      }

      const glanceDuration = 1000 + Math.random() * 1000; // hold for 1-2s
      setTimeout(() => {
        glanceOffset = { x: 0, y: 0 };
        updateEyeTransform();
        scheduleNextGlance();
      }, glanceDuration);
    }, delayBeforeGlance);
  }

  function scheduleNextBlink() {
    const delayBeforeBlink = 2000 + Math.random() * 5000; // 2-7s between blinks
    setTimeout(() => {
      setActive(blinkLayers, currentDirection);
      blinkVisible = true;

      setTimeout(() => {
        setActive(blinkLayers, null);
        blinkVisible = false;
        scheduleNextBlink();
      }, 150); // blink duration

    }, delayBeforeBlink);
  }

  updateEyeTransform();
  updateHeadLayer();
  scheduleNextGlance();
  scheduleNextBlink();

  // ---- Autopilot mode ----
  // How long (ms) the mouth needs to be idle before autopilot starts
  // turning the head to look around. This is the "a few seconds" knob.
  const AUTOPILOT_IDLE_DELAY = 4000;

  let lastTalkTime = Date.now();

  function scheduleNextAutopilotLook() {
    const delay = 3000 + Math.random() * 4000; // 3-7s between idle look changes
    setTimeout(() => {
      const idleLongEnough = (Date.now() - lastTalkTime) > AUTOPILOT_IDLE_DELAY;

      if (idleHeadEnabled && manualDirection === null && idleLongEnough) {
        // Weighted so the head spends more time facing front than turned away.
        const choices = ['front', 'left', 'right', 'front'];
        autopilotDirection = choices[Math.floor(Math.random() * choices.length)];
        refreshHeadDirection();
      }

      scheduleNextAutopilotLook();
    }, delay);
  }
  scheduleNextAutopilotLook();

  const pressedKeys = new Set();
  const LEFT_KEYS = ['KeyA'];
  const RIGHT_KEYS = ['KeyD'];
  const SMILE_KEYS = ['Digit1'];

  // Manual eye glance: arrow keys, including diagonals from held combos.
  // When any arrow key is held, we compute the offset from which arrows are
  // currently down and apply it directly, overriding the idle glance.
  // On release (when no arrow keys remain), we restore the idle glance offset
  // (or zero if idle eye movement is off).
  let manualEyeActive = false;
  const ARROW_KEYS = ['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'];

  function computeManualEyeOffset() {
    const left  = pressedKeys.has('ArrowLeft');
    const right = pressedKeys.has('ArrowRight');
    const up    = pressedKeys.has('ArrowUp');
    const down  = pressedKeys.has('ArrowDown');
    const x = (right ? 1 : 0) - (left ? 1 : 0);
    const y = (down  ? 1 : 0) - (up   ? 1 : 0);
    // Normalise diagonals so they travel the same distance as cardinals
    const len = Math.sqrt(x * x + y * y) || 1;
    return { x: (x / len) * EYE_GLANCE_DISTANCE, y: (y / len) * EYE_GLANCE_DISTANCE };
  }

  function applyManualEye() {
    const anyArrow = ARROW_KEYS.some(k => pressedKeys.has(k));
    if (anyArrow) {
      manualEyeActive = true;
      // Clear cam gaze history so there's no stale smoothing when manual releases
      camGazeXHistory = [];
      camGazeYHistory = [];
      glanceOffset = computeManualEyeOffset();
      updateEyeTransform();
    } else if (manualEyeActive) {
      manualEyeActive = false;
      // If cam eye tracking isn't taking over, snap to idle or zero
      if (!camEyeEnabled) {
        glanceOffset = { x: 0, y: 0 };
        updateEyeTransform();
      }
      // If camEyeEnabled, the next camLoop frame will update glanceOffset naturally
    }
  }

  window.addEventListener('keydown', (e) => {
    if (pressedKeys.has(e.code)) return; // ignore OS key-repeat
    pressedKeys.add(e.code);

    if (LEFT_KEYS.includes(e.code)) {
      e.preventDefault();
      manualDirection = 'left';
      refreshHeadDirection();
    } else if (RIGHT_KEYS.includes(e.code)) {
      e.preventDefault();
      manualDirection = 'right';
      refreshHeadDirection();
    } else if (ARROW_KEYS.includes(e.code)) {
      e.preventDefault();
      applyManualEye();
    } else if (SMILE_KEYS.includes(e.code)) {
      e.preventDefault();
      manualSmile = true;
      updateHeadLayer();
    } else if (e.code === 'Space') {
      e.preventDefault();
      spaceHeld = true;
      updateHeadLayer();
    }
  });

  window.addEventListener('keyup', (e) => {
    pressedKeys.delete(e.code);

    if (LEFT_KEYS.includes(e.code) || RIGHT_KEYS.includes(e.code)) {
      // if the other direction is still held, switch to it; otherwise
      // release manual control (autopilot or front takes over)
      if (RIGHT_KEYS.some(k => pressedKeys.has(k))) {
        manualDirection = 'right';
      } else if (LEFT_KEYS.some(k => pressedKeys.has(k))) {
        manualDirection = 'left';
      } else {
        manualDirection = null;
      }
      refreshHeadDirection();
    } else if (ARROW_KEYS.includes(e.code)) {
      applyManualEye();
    } else if (SMILE_KEYS.includes(e.code)) {
      manualSmile = false;
      updateHeadLayer();
    } else if (e.code === 'Space') {
      spaceHeld = false;
      updateHeadLayer();
    }
  });

  // safety reset if the window loses focus mid-keypress
  window.addEventListener('blur', () => {
    pressedKeys.clear();
    spaceHeld = false;
    manualDirection = null;
    manualSmile = false;
    manualEyeActive = false;
    glanceOffset = { x: 0, y: 0 };
    updateEyeTransform();
    refreshHeadDirection();
    updateHeadLayer();
  });

  const stageEl = document.getElementById('stage');

  // ---- Settings menu toggle ----
  const menuToggleBtn = document.getElementById('menuToggle');
  const menuEl = document.getElementById('settingsPanel');
  menuToggleBtn.addEventListener('click', () => {
    menuEl.classList.toggle('open');
    menuToggleBtn.textContent = menuEl.classList.contains('open') ? '✕ Close' : '☰ Settings';
  });

  document.getElementById('toggleBreathing').addEventListener('change', (e) => {
    stageEl.classList.toggle('bobbing', e.target.checked);
  });

  document.getElementById('toggleHeadMovement').addEventListener('change', (e) => {
    idleHeadEnabled = e.target.checked;
    if (!idleHeadEnabled) {
      autopilotDirection = 'front';
      autopilotSmile = false;
      refreshHeadDirection();
      updateHeadLayer();
    } else {
      lastTalkTime = Date.now(); // reset idle clock so it waits before wandering
    }
  });

  document.getElementById('toggleEyeMovement').addEventListener('change', (e) => {
    idleEyeEnabled = e.target.checked;
    if (!idleEyeEnabled) {
      glanceOffset = { x: 0, y: 0 };
      updateEyeTransform();
    }
  });

  document.getElementById('toggleSmileAfterTalk').addEventListener('change', (e) => {
    idleSmileEnabled = e.target.checked;
    if (!idleSmileEnabled) {
      autopilotSmile = false;
      updateHeadLayer();
    }
  });

  // ---- Mic mode ----

  let audioContext = null;
  let analyser = null;
  let micStream = null;
  let dataArray = null;

  const micToggle = document.getElementById('micToggle');
  const micSettings = document.getElementById('micSettings');
  const thresholdSlider = document.getElementById('threshold');
  const meterFill = document.getElementById('meterFill');

  threshold = Number(thresholdSlider.value);

  thresholdSlider.addEventListener('input', () => {
    threshold = Number(thresholdSlider.value);
  });

  micToggle.addEventListener('change', async () => {
    if (micToggle.checked) {
      const ok = await enableMic();
      if (!ok) {
        micToggle.checked = false;
        return;
      }
      micSettings.style.display = 'block';
    } else {
      disableMic();
      micSettings.style.display = 'none';
    }
  });

  async function enableMic() {
    try {
      micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch (err) {
      alert('Could not access the microphone. Check your browser permissions and try again.');
      return false;
    }

    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const source = audioContext.createMediaStreamSource(micStream);
    analyser = audioContext.createAnalyser();
    analyser.fftSize = 512;
    source.connect(analyser);
    dataArray = new Uint8Array(analyser.fftSize);

    micEnabled = true;
    requestAnimationFrame(meterLoop);
    return true;
  }

  function disableMic() {
    micEnabled = false;
    currentVolume = 0;
    meterFill.style.width = '0%';
    updateHeadLayer();

    if (micStream) {
      micStream.getTracks().forEach(track => track.stop());
      micStream = null;
    }
    if (audioContext) {
      audioContext.close();
      audioContext = null;
    }
    analyser = null;
    dataArray = null;
  }

  function meterLoop() {
    if (!micEnabled) return;

    analyser.getByteTimeDomainData(dataArray);

    // root-mean-square of the waveform, scaled to roughly 0-100
    let sumSquares = 0;
    for (let i = 0; i < dataArray.length; i++) {
      const sample = (dataArray[i] - 128) / 128;
      sumSquares += sample * sample;
    }
    const rms = Math.sqrt(sumSquares / dataArray.length);
    currentVolume = Math.min(100, rms * 300);

    meterFill.style.width = currentVolume + '%';
    meterFill.style.backgroundColor = currentVolume > threshold ? '#4caf50' : '#888';

    requestAnimationFrame(meterLoop);
  }

  // ---- Background color & image ----
  const bgEl = document.getElementById('stageBg');
  const bgColorPicker = document.getElementById('bgColorPicker');
  const bgImagePicker = document.getElementById('bgImagePicker');
  const bgImageName = document.getElementById('bgImageName');
  const clearBgImage = document.getElementById('clearBgImage');

  let bgImageURL = null;

  function applyBackground() {
    bgEl.style.backgroundColor = bgColorPicker.value;
    document.body.style.backgroundColor = bgColorPicker.value;
    document.documentElement.style.backgroundColor = bgColorPicker.value;
    if (bgImageURL) {
      bgEl.style.backgroundImage = `url(${bgImageURL})`;
    } else {
      bgEl.style.backgroundImage = 'none';
    }
  }

  bgColorPicker.addEventListener('input', applyBackground);

  bgImagePicker.addEventListener('change', () => {
    const file = bgImagePicker.files[0];
    if (!file) return;

    if (bgImageURL) URL.revokeObjectURL(bgImageURL);
    bgImageURL = URL.createObjectURL(file);

    bgImageName.textContent = file.name;
    clearBgImage.style.display = 'inline-block';
    applyBackground();
  });

  // ---- Webcam / face tracking ----
  // Uses MediaPipe FaceLandmarker (loaded as an ES module above).
  // Drives head direction and mouth-open the same way manual keys do —
  // webcam sets camDirection / camMouthOpen flags, and the existing
  // shouldAnimateMouth() / refreshHeadDirection() logic applies them.
  // Manual key presses still take priority over webcam input.

  // camEnabled / camDirection / camMouthOpen are declared up top so
  // shouldAnimateMouth() can reference them from the start.

  let camMouthEnabled = true;
  let camSmileEnabled = true;  // whether webcam blendshapes drive smile
  let camTiltEnabled  = true;
  let camLeanEnabled  = true;
  let camEyeEnabled   = true;
  let camTiltDeg      = 0;
  let camLeanDeg      = 0;

  // Thresholds (tunable via sliders)
  let camYawThreshold   = 12;
  let camMouthThreshold = 0.04;
  let camOFaceThreshold = 0.40; // jawOpen blendshape score to trigger O-face
  const CAM_SMILE_THRESHOLD = 0.3;

  // Minimum time (ms) a webcam-detected state must be held before it commits.
  // Prevents flickering between states on noisy frames.
  const CAM_DEBOUNCE_MS = 220;

  let faceLandmarker = null;
  let camStream      = null;
  let camRunning     = false;

  const camToggle        = document.getElementById('toggleCam');
  const camSettingsDiv   = document.getElementById('camSettings');
  const camStatusEl      = document.getElementById('camStatus');
  const camVideoEl       = document.getElementById('camVideo');
  const camFloatPreview  = document.getElementById('camFloatPreview');
  const camCanvas        = document.getElementById('camCanvas');
  const camCtx           = camCanvas.getContext('2d');
  const camYawSlider     = document.getElementById('camYawThresh');
  const camYawValEl      = document.getElementById('camYawVal');
  const camMouthSlider   = document.getElementById('camMouthThresh');
  const camMouthValEl    = document.getElementById('camMouthVal');
  const camMouthSliderWrap = document.getElementById('camMouthSliderWrap');
  const camPreviewToggle = document.getElementById('toggleCamPreview');
  const camMouthToggle   = document.getElementById('toggleCamMouth');
  const camSmileToggle   = document.getElementById('toggleCamSmile');
  const camTiltToggle    = document.getElementById('toggleCamTilt');
  const camLeanToggle    = document.getElementById('toggleCamLean');
  const camEyeToggle     = document.getElementById('toggleCamEyes');
  const headWrapEl       = document.getElementById('tilt-wrap');

  camMouthToggle.addEventListener('change', () => {
    camMouthEnabled = camMouthToggle.checked;
    camMouthSliderWrap.style.display = camMouthEnabled ? 'flex' : 'none';
    if (!camMouthEnabled) {
      camMouthOpen = false;
      updateHeadLayer();
    }
  });

  camTiltToggle.addEventListener('change', () => {
    camTiltEnabled = camTiltToggle.checked;
    if (!camTiltEnabled) {
      camTiltDeg = 0;
      applyHeadTilt(0);
    }
  });

  const puppetWrapEl = document.getElementById('puppet-wrap');

  camLeanToggle.addEventListener('change', () => {
    camLeanEnabled = camLeanToggle.checked;
    if (!camLeanEnabled) {
      camLeanDeg = 0;
      applyLean(0);
    }
  });

  camEyeToggle.addEventListener('change', () => {
    camEyeEnabled = camEyeToggle.checked;
    if (!camEyeEnabled && !manualEyeActive && !idleEyeEnabled) {
      glanceOffset = { x: 0, y: 0 };
      updateEyeTransform();
    }
  });

  function applyLean(deg) {
    puppetWrapEl.style.transform = deg === 0 ? '' : `rotate(${deg}deg)`;
  }

  camYawSlider.addEventListener('input', () => {
    camYawThreshold = Number(camYawSlider.value);
    camYawValEl.textContent = camYawThreshold + '°';
  });

  camMouthSlider.addEventListener('input', () => {
    camMouthThreshold = Number(camMouthSlider.value) / 100;
    camMouthValEl.textContent = camMouthThreshold.toFixed(2);
  });

  const camOFaceSlider  = document.getElementById('camOFaceThresh');
  const camOFaceValEl   = document.getElementById('camOFaceVal');

  camOFaceSlider.addEventListener('input', () => {
    camOFaceThreshold = Number(camOFaceSlider.value) / 100;
    camOFaceValEl.textContent = camOFaceThreshold.toFixed(2);
  });

  const camCalibrateBtn    = document.getElementById('camCalibrateBtn');
  const camCalibrateStatus = document.getElementById('camCalibrateStatus');

  // While > 0, camLoop accumulates raw gaze samples for calibration
  let camCalibFramesLeft = 0;
  let camCalibSumX = 0;
  let camCalibSumY = 0;
  let camCalibCount = 0;
  const CAM_CALIB_FRAMES = 30; // ~1 second of frames at 30fps

  camCalibrateBtn.addEventListener('click', () => {
    if (!camEnabled) {
      camCalibrateStatus.textContent = 'Enable webcam tracking first.';
      return;
    }
    camCalibrateStatus.textContent = 'Look directly at the camera…';
    camCalibSumX = 0;
    camCalibSumY = 0;
    camCalibCount = 0;
    camCalibFramesLeft = CAM_CALIB_FRAMES;
  });

  // Gaze calibration offsets — set by the "Calibrate eye center" button.
  // These are subtracted from raw gaze before clamping so neutral gaze = center.
  let camGazeCalibX = 0;
  let camGazeCalibY = 0;

  camPreviewToggle.addEventListener('change', () => {
    if (camEnabled) {
      camFloatPreview.style.display = camPreviewToggle.checked ? 'block' : 'none';
    }
  });

  camSmileToggle.addEventListener('change', () => {
    camSmileEnabled = camSmileToggle.checked;
    if (!camSmileEnabled && autopilotSmile) {
      autopilotSmile = false;
      updateHeadLayer();
    }
  });

  camToggle.addEventListener('change', async () => {
    if (camToggle.checked) {
      await enableCam();
    } else {
      disableCam();
    }
  });

  async function enableCam() {
    camStatusEl.textContent = 'Loading face model…';
    camSettingsDiv.style.display = 'block';

    // Wait for MediaPipe ES module to finish loading if it hasn't yet
    if (!window._mpReady) {
      await new Promise(resolve => window.addEventListener('mpReady', resolve, { once: true }));
    }

    try {
      const vision = await window._FilesetResolver.forVisionTasks(
        'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm'
      );
      faceLandmarker = await window._FaceLandmarker.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task',
          delegate: 'GPU'
        },
        outputFaceBlendshapes: true,
        runningMode: 'VIDEO',
        numFaces: 1
      });
    } catch (err) {
      camStatusEl.textContent = 'Failed to load face model.';
      camToggle.checked = false;
      camSettingsDiv.style.display = 'none';
      return;
    }

    try {
      camStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
    } catch (err) {
      camStatusEl.textContent = 'Camera access denied.';
      camToggle.checked = false;
      camSettingsDiv.style.display = 'none';
      return;
    }

    camVideoEl.srcObject = camStream;
    await new Promise(resolve => camVideoEl.addEventListener('loadeddata', resolve, { once: true }));

    camEnabled = true;
    camRunning = true;
    camStatusEl.textContent = 'Tracking active';
    if (camPreviewToggle.checked) camFloatPreview.style.display = 'block';
    requestAnimationFrame(camLoop);
  }

  function applyHeadTilt(deg) {
    // Subtract the current lean angle so the head stays visually upright
    // when the body leans. Without this, a left lean also visually tilts
    // the head left since tilt-wrap is inside puppet-wrap.
    const compensated = deg - camLeanDeg;
    headWrapEl.style.transform = compensated === 0 ? '' : `rotate(${compensated}deg)`;
  }

  function disableCam() {
    camRunning = false;
    camEnabled = false;
    camDirection = null;
    camMouthOpen = false;
    camMouthWide = false;
    camTiltDeg = 0;
    camLeanDeg = 0;
    camBlinking = false;
    camCalibFramesLeft = 0;
    camGazeXHistory = [];
    camGazeYHistory = [];
    applyHeadTilt(0);
    applyLean(0);
    if (!manualEyeActive && !idleEyeEnabled) {
      glanceOffset = { x: 0, y: 0 };
      updateEyeTransform();
    }
    if (autopilotSmile) {
      autopilotSmile = false;
      updateHeadLayer();
    }
    camStatusEl.textContent = '';
    camSettingsDiv.style.display = 'none';
    camFloatPreview.style.display = 'none';

    if (camStream) {
      camStream.getTracks().forEach(t => t.stop());
      camStream = null;
    }
    camVideoEl.srcObject = null;

    // Release webcam influence on puppet state
    refreshHeadDirection();
    updateHeadLayer();
  }

  // Smoothing histories for yaw, roll (tilt), lateral position (lean), and iris gaze
  // camGazeXHistory / camGazeYHistory are declared up top alongside other cam state.
  let camYawHistory  = [];
  let camRollHistory = [];
  let camLeanHistory = [];
  const CAM_SMOOTH_FRAMES = 4;
  const CAM_GAZE_SMOOTH_FRAMES = 6;

  // Max degrees for tilt and lean
  const CAM_MAX_TILT = 20;
  const CAM_MAX_LEAN = 12;

  // ---- Debounced state committer ----
  // Each signal (head direction, mouth, smile) gets its own pending slot.
  // A state change only commits after it's been the candidate for
  // CAM_DEBOUNCE_MS continuously — a single off-frame won't flip it back.
  const camPending = {
    dir:   { value: null,  since: 0 },
    mouth: { value: false, since: 0 },
    smile: { value: false, since: 0 },
    blink: { value: false, since: 0 },
    wide:  { value: false, since: 0 }
  };

  function debounceSet(key, newValue, commitFn) {
    const slot = camPending[key];
    const now = performance.now();
    if (newValue !== slot.value) {
      slot.value = newValue;
      slot.since = now;
    } else if ((now - slot.since) >= CAM_DEBOUNCE_MS) {
      commitFn(newValue);
    }
  }

  function camLoop() {
    if (!camRunning) return;

    if (camVideoEl.readyState >= 2) {
      const now = performance.now();
      const results = faceLandmarker.detectForVideo(camVideoEl, now);

      // Draw mirrored video to the canvas preview (only costs anything when visible)
      if (camPreviewToggle.checked) {
        camCanvas.width  = camVideoEl.videoWidth  || 320;
        camCanvas.height = camVideoEl.videoHeight || 240;
        camCtx.drawImage(camVideoEl, 0, 0, camCanvas.width, camCanvas.height);
      }

      if (results.faceLandmarks && results.faceLandmarks.length > 0) {
        const lm = results.faceLandmarks[0];

        // ---- Head yaw ----
        // Compare the x-position of the nose tip (landmark 1) relative to
        // the midpoint between the two ear-tragus landmarks (234 = right
        // ear, 454 = left ear from the camera's perspective, which is
        // mirrored, so 234 is the puppet's left).
        // A positive offset means the nose is shifted right → head turned
        // right in camera space → puppet looks left (mirrored).
        const noseTip  = lm[1];
        const earRight = lm[234]; // camera right = puppet left
        const earLeft  = lm[454]; // camera left  = puppet right
        const faceWidth = Math.abs(earLeft.x - earRight.x);

        // Normalise nose offset as a fraction of face width, then convert
        // to a rough degree equivalent (faceWidth ≈ 0.5 at 90° span).
        const noseOffset = noseTip.x - (earRight.x + earLeft.x) / 2;
        const yawDeg = (noseOffset / (faceWidth || 0.01)) * 90;

        // Smooth over the last N frames
        camYawHistory.push(yawDeg);
        if (camYawHistory.length > CAM_SMOOTH_FRAMES) camYawHistory.shift();
        const smoothYaw = camYawHistory.reduce((a, b) => a + b, 0) / camYawHistory.length;

        // Positive smoothYaw = camera sees face turned right = puppet turns left
        // (because the video is mirrored so movement feels natural to the user)
        let newCamDir = null;
        if (smoothYaw > camYawThreshold)       newCamDir = 'left';
        else if (smoothYaw < -camYawThreshold) newCamDir = 'right';

        debounceSet('dir', newCamDir, (dir) => {
          if (dir !== camDirection) {
            camDirection = dir;
            if (manualDirection === null) refreshHeadDirection();
          }
        });

        // ---- Body lean (lateral face position) ----
        // The nose tip x position ranges 0 (left edge) to 1 (right edge).
        // Center = 0.5. Because the preview is mirrored, face on the left
        // of the frame means the puppet leans left (toward camera).
        // We map the offset from center to a lean angle on the whole stage,
        // pivoting from the bottom so it feels like leaning from the hips.
        if (camLeanEnabled) {
          // noseTip is already computed above for yaw
          const lateralOffset = noseTip.x - 0.5; // -0.5 to +0.5
          // Mirror: face right in camera = puppet leans left
          const rawLean = -lateralOffset * CAM_MAX_LEAN * 2;

          camLeanHistory.push(rawLean);
          if (camLeanHistory.length > CAM_SMOOTH_FRAMES) camLeanHistory.shift();
          const smoothLean = camLeanHistory.reduce((a, b) => a + b, 0) / camLeanHistory.length;
          const newLean = Math.max(-CAM_MAX_LEAN, Math.min(CAM_MAX_LEAN, smoothLean));

          if (Math.abs(newLean - camLeanDeg) > 0.2) {
            camLeanDeg = newLean;
            applyLean(camLeanDeg);
            applyHeadTilt(camTiltDeg); // recompute compensation against new lean
          }
        }

        // ---- Head roll (tilt) ----
        // Angle of the line between the two eye outer corners.
        // Landmark 33 = left eye outer, 263 = right eye outer (face space).
        // Because the preview is mirrored, a clockwise tilt in the mirror
        // (right ear toward right shoulder) gives a positive angle, so we
        // negate to make the puppet tilt the same way the user does.
        if (camTiltEnabled) {
          const eyeL = lm[33];
          const eyeR = lm[263];
          // atan2 gives the angle of the eye-to-eye vector; 0 = horizontal
          const rawRoll = Math.atan2(eyeR.y - eyeL.y, eyeR.x - eyeL.x) * (180 / Math.PI);

          camRollHistory.push(rawRoll);
          if (camRollHistory.length > CAM_SMOOTH_FRAMES) camRollHistory.shift();
          const smoothRoll = camRollHistory.reduce((a, b) => a + b, 0) / camRollHistory.length;

          // Clamp and negate (mirror correction: right tilt in camera = right tilt on puppet)
          const newTilt = Math.max(-CAM_MAX_TILT, Math.min(CAM_MAX_TILT, -smoothRoll));
          if (Math.abs(newTilt - camTiltDeg) > 0.3) {
            camTiltDeg = newTilt;
            applyHeadTilt(camTiltDeg);
          }
        }

        // ---- Smile detection (blendshapes) ----
        // Evaluated BEFORE mouth-open so smile can suppress it — showing
        // top teeth while smiling reads as mouth-open otherwise.
        let camSmiling = false;
        if (camSmileEnabled && results.faceBlendshapes && results.faceBlendshapes.length > 0) {
          const blendshapes = results.faceBlendshapes[0].categories;
          const smileL = blendshapes.find(b => b.categoryName === 'mouthSmileLeft');
          const smileR = blendshapes.find(b => b.categoryName === 'mouthSmileRight');
          if (smileL && smileR) {
            const smileScore = (smileL.score + smileR.score) / 2;
            camSmiling = smileScore > CAM_SMILE_THRESHOLD;
          }
        }
        debounceSet('smile', camSmiling, (smiling) => {
          if (smiling !== autopilotSmile) {
            autopilotSmile = smiling;
            updateHeadLayer();
          }
        });

        // ---- Mouth open ----
        // Suppressed while smiling so top-teeth smiles don't trigger talking.
        // Also detects a wide-open O-shape via the jawOpen blendshape for
        // the open-but-silent idle shape logic.
        if (camMouthEnabled) {
          const upperLip  = lm[13];
          const lowerLip  = lm[14];
          const leftEye   = lm[33];
          const rightEye  = lm[263];
          const eyeDist   = Math.hypot(rightEye.x - leftEye.x, rightEye.y - leftEye.y);
          const lipGap    = Math.abs(lowerLip.y - upperLip.y) / (eyeDist || 0.01);
          const mouthOpen = !camSmiling && lipGap > camMouthThreshold;

          // Wide open O-face: use jawOpen blendshape (threshold higher than talk)
          let jawOpen = 0;
          if (results.faceBlendshapes && results.faceBlendshapes.length > 0) {
            const bs = results.faceBlendshapes[0].categories;
            const jaw = bs.find(b => b.categoryName === 'jawOpen');
            if (jaw) jawOpen = jaw.score;
          }
          const mouthWide = !camSmiling && jawOpen > camOFaceThreshold;

          debounceSet('mouth', mouthOpen, (open) => {
            if (open !== camMouthOpen) {
              camMouthOpen = open;
              updateHeadLayer();
            }
          });

          debounceSet('wide', mouthWide, (wide) => {
            if (wide !== camMouthWide) {
              camMouthWide = wide;
              updateHeadLayer();
            }
          });
        }

        // ---- Blink detection ----
        // eyeBlinkLeft + eyeBlinkRight blendshapes. When blinking:
        // - trigger the blink overlay layer (same as the auto-blink timer)
        // - freeze gaze immediately (before debounce commits) so iris landmarks
        //   don't slide into garbage positions as eyes close
        let rawBlinkScore = 0;
        if (results.faceBlendshapes && results.faceBlendshapes.length > 0) {
          const bs = results.faceBlendshapes[0].categories;
          const blinkL = bs.find(b => b.categoryName === 'eyeBlinkLeft');
          const blinkR = bs.find(b => b.categoryName === 'eyeBlinkRight');
          rawBlinkScore = blinkL && blinkR ? (blinkL.score + blinkR.score) / 2 : 0;
          const nowBlinking = rawBlinkScore > 0.4;

          debounceSet('blink', nowBlinking, (blinking) => {
            if (blinking === camBlinking) return;
            camBlinking = blinking;
            if (blinking) {
              setActive(blinkLayers, currentDirection);
              blinkVisible = true;
            } else {
              setActive(blinkLayers, null);
              blinkVisible = false;
            }
          });
        }

        // ---- Iris gaze tracking ----
        // Freeze as soon as blink score is elevated — don't wait for debounce,
        // because the iris slides immediately as the eye closes.
        const eyesClosing = rawBlinkScore > 0.25;
        if (camEyeEnabled && !manualEyeActive && !eyesClosing) {
          const leftIris  = lm[468]; // left iris center
          const rightIris = lm[473]; // right iris center

          // Left eye socket: outer corner 33, inner corner 133
          const leftOuter  = lm[33];
          const leftInner  = lm[133];
          const leftTop    = lm[159];
          const leftBottom = lm[145];

          // Right eye socket: inner corner 362, outer corner 263
          const rightInner = lm[362];
          const rightOuter = lm[263];
          const rightTop   = lm[386];
          const rightBottom = lm[374];

          // Use eye-look blendshapes for gaze — more reliable than raw iris
          // landmark positions, especially for vertical (up/down) gaze which
          // is hard to measure accurately from landmark geometry alone.
          // eyeLookOutLeft  = left eye looking toward left ear  (camera right, puppet left after mirror)
          // eyeLookInLeft   = left eye looking toward nose      (camera left,  puppet right after mirror)
          // eyeLookUpLeft   = left eye looking up
          // eyeLookDownLeft = left eye looking down
          // Right eye counterparts are mirrored: OutRight = right ear = camera left = puppet right
          let gazeX = 0, gazeY = 0;

          if (results.faceBlendshapes && results.faceBlendshapes.length > 0) {
            const bs = results.faceBlendshapes[0].categories;
            const get = name => (bs.find(b => b.categoryName === name) || { score: 0 }).score;

            // Left eye: Out = camera-right, In = camera-left
            const leftOut  = get('eyeLookOutLeft');   // camera right
            const leftIn   = get('eyeLookInLeft');    // camera left
            const leftUp   = get('eyeLookUpLeft');
            const leftDown = get('eyeLookDownLeft');

            // Right eye: Out = camera-left, In = camera-right
            const rightOut = get('eyeLookOutRight');  // camera left
            const rightIn  = get('eyeLookInRight');   // camera right
            const rightUp  = get('eyeLookUpRight');
            const rightDown = get('eyeLookDownRight');

            // Horizontal: camera-right is positive raw; negate for puppet mirror.
            const rawX = ((leftOut - leftIn) + (rightIn - rightOut)) / 2;
            // Vertical: down blendshapes are reliable; up blendshapes are
            // underreported by MediaPipe so we scale them up 2x to compensate.
            const leftUpScaled  = leftUp  * 2;
            const rightUpScaled = rightUp * 2;
            const rawY = ((leftDown - leftUpScaled) + (rightDown - rightUpScaled)) / 2;

            camGazeXHistory.push(rawX);
            camGazeYHistory.push(rawY);
            if (camGazeXHistory.length > CAM_GAZE_SMOOTH_FRAMES) camGazeXHistory.shift();
            if (camGazeYHistory.length > CAM_GAZE_SMOOTH_FRAMES) camGazeYHistory.shift();

            const smoothX = camGazeXHistory.reduce((a, b) => a + b, 0) / camGazeXHistory.length;
            const smoothY = camGazeYHistory.reduce((a, b) => a + b, 0) / camGazeYHistory.length;

            // Scale into the glance offset range. Blendshape scores are 0-1 per
            // direction, so net range is roughly -1 to +1 after differencing.
            gazeX = -smoothX * EYE_GLANCE_DISTANCE * 3; // negate for mirror
            gazeY =  smoothY * EYE_GLANCE_DISTANCE * 3;

            // If a calibration pass is in progress, accumulate raw values
            // before applying any offset (we're measuring the raw drift)
            if (camCalibFramesLeft > 0) {
              camCalibSumX += gazeX;
              camCalibSumY += gazeY;
              camCalibCount++;
              camCalibFramesLeft--;
              if (camCalibFramesLeft === 0) {
                camGazeCalibX = camCalibSumX / camCalibCount;
                camGazeCalibY = camCalibSumY / camCalibCount;
                camCalibrateStatus.textContent =
                  `Calibrated (offset ${camGazeCalibX.toFixed(2)}, ${camGazeCalibY.toFixed(2)})`;
              }
            }

            // Subtract calibration offset so neutral gaze = center
            gazeX -= camGazeCalibX;
            gazeY -= camGazeCalibY;

            // Clamp to the same range arrow keys use so irises stay in socket
            const D = EYE_GLANCE_DISTANCE;
            gazeX = Math.max(-D, Math.min(D, gazeX));
            gazeY = Math.max(-D, Math.min(D, gazeY));
          }

          const newGazeOffset = { x: gazeX, y: gazeY };

          if (Math.abs(newGazeOffset.x - glanceOffset.x) > 0.05 ||
              Math.abs(newGazeOffset.y - glanceOffset.y) > 0.05) {
            glanceOffset = newGazeOffset;
            updateEyeTransform();
          }
        }

      } else {
        // No face detected — reset all pending debounce slots and release states
        camPending.dir.value   = null;
        camPending.mouth.value = false;
        camPending.smile.value = false;
        camPending.blink.value = false;
        camPending.wide.value  = false;

        if (camBlinking) {
          camBlinking = false;
          setActive(blinkLayers, null);
          blinkVisible = false;
        }
        if (camDirection !== null) {
          camDirection = null;
          if (manualDirection === null) refreshHeadDirection();
        }
        if (camMouthOpen) {
          camMouthOpen = false;
          updateHeadLayer();
        }
        if (camTiltDeg !== 0) {
          camTiltDeg = 0;
          applyHeadTilt(0);
        }
        if (camLeanDeg !== 0) {
          camLeanDeg = 0;
          applyLean(0);
        }
        if (camEyeEnabled && !manualEyeActive) {
          camGazeXHistory = [];
          camGazeYHistory = [];
          if (glanceOffset.x !== 0 || glanceOffset.y !== 0) {
            glanceOffset = { x: 0, y: 0 };
            updateEyeTransform();
          }
        }
        if (camSmileEnabled && autopilotSmile) {
          autopilotSmile = false;
          updateHeadLayer();
        }
      }
    }

    requestAnimationFrame(camLoop);
  }
</script>
